[workspace]
# routecrab is an application, not a crates.io library. Determine versions from
# git tags (not the registry) so release-plz can compute the next version + open
# the version-bump PR (release-pr). Without this, the missing crates.io baseline
# makes release-plz always report "up to date" and never bump.
git_only = true

[[package]]
name = "routecrab"
changelog_path = "CHANGELOG.md"
changelog_update = true
git_release_enable = true
# Publish releases directly instead of as drafts (release-plz defaults to draft).
git_release_draft = false
publish = false
