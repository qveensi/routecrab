<div class="card" data-health="{{ route.health|lower }}" id="route-{{ route.id }}">
  {% if !route.url.is_empty() %}<a class="card-overlay" href="{{ route.url }}" target="_blank" rel="noopener" aria-label="Open {{ route.name }}"></a>{% endif %}
  <div class="card-top">
    <span class="card-icon" aria-hidden="true" data-mono="{% if !route.title.is_empty() %}{{ route.title }}{% else %}{{ route.name }}{% endif %}">
      <img class="card-img" src="{{ icon_url }}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="iconFail(this)">
    </span>
    <span class="card-title">{% if !route.title.is_empty() %}{{ route.title }}{% else %}{{ route.name }}{% endif %}</span>
    <span class="badge" title="Health: {{ route.health|lower }}">
      <span class="badge-dot" aria-hidden="true"></span>
      <span class="badge-label">{{ route.health|lower }}</span>
    </span>
  </div>
  {% if !route.url.is_empty() %}
    <a class="card-url" href="{{ route.url }}" target="_blank" rel="noopener" title="{{ route.url }}">{{ route.url }}</a>
  {% endif %}
  {% if !route.description.is_empty() %}
    <p class="card-description">{{ route.description }}</p>
  {% endif %}
</div>
