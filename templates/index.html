<!DOCTYPE html>
<html lang="en" data-theme="dark" data-view="grid">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <!-- Inline favicon: brand-mark SVG as data URI (CSP/offline-safe) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234c8dff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='5' cy='6' r='2.4'/%3E%3Ccircle cx='19' cy='6' r='2.4'/%3E%3Ccircle cx='12' cy='18' r='2.4'/%3E%3Cpath d='M7 7.4 10.4 16M16.8 7.6 13.4 16M7.2 6h9.6'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/assets/app.css">
  <script>
    // Apply stored theme + view before first paint to avoid flash.
    (function () {
      var stored = localStorage.getItem('theme');
      var t = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);

      var v = localStorage.getItem('view') || 'grid';
      document.documentElement.setAttribute('data-view', v);

      // Track OS theme changes only when user has not made an explicit choice.
      if (!stored) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          // Re-check: user may have toggled since page load.
          if (!localStorage.getItem('theme')) {
            document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          }
        });
      }
    })();
  </script>
</head>
<body>
  <h1 class="sr-only">{{ title }} — Gateway API route dashboard</h1>
  <header class="header">
    <a class="brand" href="/" aria-label="{{ title }}">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="6" r="2.4"></circle>
          <circle cx="19" cy="6" r="2.4"></circle>
          <circle cx="12" cy="18" r="2.4"></circle>
          <path d="M7 7.4 10.4 16M16.8 7.6 13.4 16M7.2 6h9.6"></path>
        </svg>
      </span>
      <span class="brand-name">route<b>crab</b></span>
      <span class="live" id="live" data-state="connecting" role="status" aria-label="Live updates connection" title="Live updates connection">
        <span class="live-dot" aria-hidden="true"></span><span class="live-label">live</span>
      </span>
    </a>

    <div class="summary" id="summary" aria-label="Cluster health summary">
      <button type="button" class="stat ok"   data-zero="true" aria-pressed="false" data-filter="healthy"   title="Filter: healthy" onclick="toggleFilter('healthy')"><span class="dot" aria-hidden="true"></span><b id="c-healthy">0</b><span class="stat-label">healthy</span></button>
      <button type="button" class="stat warn" data-zero="true" aria-pressed="false" data-filter="degraded"  title="Filter: degraded" onclick="toggleFilter('degraded')"><span class="dot" aria-hidden="true"></span><b id="c-degraded">0</b><span class="stat-label">degraded</span></button>
      <button type="button" class="stat down" data-zero="true" aria-pressed="false" data-filter="unhealthy" title="Filter: unhealthy" onclick="toggleFilter('unhealthy')"><span class="dot" aria-hidden="true"></span><b id="c-unhealthy">0</b><span class="stat-label">unhealthy</span></button>
      <button type="button" class="stat idle" data-zero="true" aria-pressed="false" data-filter="unknown"   title="Filter: unknown" onclick="toggleFilter('unknown')"><span class="dot" aria-hidden="true"></span><b id="c-unknown">0</b><span class="stat-label">unknown</span></button>
    </div>

    <div class="header-tools">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path>
        </svg>
        <input
          class="search-input"
          type="search"
          name="q"
          placeholder="Search routes…"
          value="{{ query }}"
          hx-get="/"
          hx-trigger="input changed delay:300ms, search"
          hx-target="#board"
          hx-select="#board > *"
          hx-push-url="true"
          autocomplete="off"
          aria-label="Search routes"
        >
      </div>
      <button class="view-toggle" onclick="toggleView()" aria-label="Toggle grid/list view">
        <!-- grid icon: shown in grid view (current mode indicator) -->
        <svg class="icon-view-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <!-- list icon: shown in list view (current mode indicator) -->
        <svg class="icon-view-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle color theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8 6 18M18 6l1.8-1.8"></path></svg>
      </button>
    </div>
  </header>

  <main class="main" id="board" hx-ext="sse" sse-connect="/events">
    {% include "_board.html" %}
  </main>

  <footer class="footer">
    <a href="https://github.com/qveensi/routecrab" target="_blank" rel="noopener" aria-label="Source on GitHub">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
    </a>
    <span class="footer-right">© {{ year }} · routecrab v{{ version }}</span>
  </footer>

  <script src="/assets/htmx.min.js"></script>
  <script src="/assets/sse.js"></script>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    function toggleView() {
      var html = document.documentElement;
      var next = html.getAttribute('data-view') === 'grid' ? 'list' : 'grid';
      html.setAttribute('data-view', next);
      localStorage.setItem('view', next);
    }

    (function () {
      function firstLetter(s) { s = (s || '').trim(); return s ? s.charAt(0).toUpperCase() : '?'; }

      window.iconFail = function (img) {
        var p = img.parentElement;
        if (!p) return;
        p.classList.add('card-icon--mono');
        // The textContent setter clears the <img> AND the whitespace text nodes
        // around it, then writes the monogram letter. (A `!p.textContent` guard
        // fails here because the span contains newline whitespace around the img.)
        p.textContent = firstLetter(p.getAttribute('data-mono'));
      };

      function decorateMonos(root) {
        (root || document).querySelectorAll('.card-icon--mono').forEach(function (el) {
          if (!el.textContent) { el.textContent = firstLetter(el.getAttribute('data-mono')); }
        });
      }

      function count(scope) {
        var c = { healthy: 0, degraded: 0, unhealthy: 0, unknown: 0 };
        scope.querySelectorAll('.card').forEach(function (card) {
          var h = card.getAttribute('data-health') || 'unknown';
          if (c[h] === undefined) h = 'unknown';
          c[h]++;
        });
        return c;
      }

      function setStat(id, n) {
        var el = document.getElementById(id);
        if (!el) return;
        el.textContent = n;
        var st = el.closest('.stat');
        if (st) st.setAttribute('data-zero', n === 0 ? 'true' : 'false');
      }

      function chip(kind, n) { return '<span class="gm gm-' + kind + '"><i></i>' + n + '</span>'; }

      function refresh() {
        var board = document.getElementById('board');
        if (!board) return;
        decorateMonos(board);

        var total = count(board);
        setStat('c-healthy', total.healthy);
        setStat('c-degraded', total.degraded);
        setStat('c-unhealthy', total.unhealthy);
        setStat('c-unknown', total.unknown);

        board.querySelectorAll('.group').forEach(function (g) {
          var meta = g.querySelector('.group-meta');
          if (!meta) return;
          var gc = count(g);
          var html = chip('healthy', gc.healthy);
          ['degraded', 'unhealthy', 'unknown'].forEach(function (k) {
            if (gc[k] > 0) html += chip(k, gc[k]);
          });
          meta.innerHTML = html;
        });

        applyFilter();
      }

      // Click a header stat pill to filter the board to that health status
      // (click again to clear). Re-applied after every re-render via refresh().
      var activeFilter = null;
      window.toggleFilter = function (h) {
        activeFilter = (activeFilter === h) ? null : h;
        applyFilter();
      };
      function applyFilter() {
        document.querySelectorAll('.stat[data-filter]').forEach(function (s) {
          var on = s.getAttribute('data-filter') === activeFilter;
          s.classList.toggle('stat--active', on);
          s.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
        var board = document.getElementById('board');
        if (!board) return;
        board.querySelectorAll('.card').forEach(function (c) {
          var show = !activeFilter || (c.getAttribute('data-health') || 'unknown') === activeFilter;
          c.style.display = show ? '' : 'none';
        });
        board.querySelectorAll('.group').forEach(function (g) {
          var any = Array.prototype.some.call(g.querySelectorAll('.card'), function (c) {
            return c.style.display !== 'none';
          });
          g.style.display = any ? '' : 'none';
        });
      }

      function setLive(state) {
        var el = document.getElementById('live');
        if (el) el.setAttribute('data-state', state);
      }

      document.addEventListener('htmx:sseOpen', function () { setLive('live'); });
      document.addEventListener('htmx:sseError', function () { setLive('offline'); });
      document.addEventListener('htmx:sseClose', function () { setLive('offline'); });
      document.addEventListener('htmx:afterSettle', refresh);
      document.addEventListener('htmx:oobAfterSwap', function (e) {
        var t = e.detail && e.detail.target;
        if (t && t.classList && t.classList.contains('card')) {
          t.classList.remove('rc-flash');
          void t.offsetWidth;
          t.classList.add('rc-flash');
        }
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', refresh);
      } else {
        refresh();
      }
    })();
  </script>
</body>
</html>
