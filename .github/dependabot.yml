version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk patch/minor bumps into one PR to cut noise.
      patch-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions (we pin action majors; Dependabot bumps them)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
