name: release

# Single workflow with two triggers:
#   - push to main  → release-plz jobs (PR + tag creation)
#   - push of v* tag → image and Helm chart publish jobs
#
# Jobs are gated by `if:` so only the relevant set runs for each trigger.
on:
  push:
    branches: [main]
    tags: ["v*"]

# Least privilege by default; jobs escalate only what they need.
permissions:
  contents: read

# ---------------------------------------------------------------------------
# release-plz: open/update a release PR, then tag + GitHub-release when merged
# ---------------------------------------------------------------------------
jobs:
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # Runs only on pushes to main (not on tag pushes).
    if: github.ref == 'refs/heads/main'
    # Serialize releases: two rapid pushes to main must not race on tag creation.
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # A PAT (RELEASE_PLZ_TOKEN) is required so the tag release-plz pushes
          # re-triggers the tag-gated publish workflows below — GitHub skips
          # workflow events from the default GITHUB_TOKEN. Falls back to
          # GITHUB_TOKEN (release succeeds, but image/chart publish won't fire).
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Prevent concurrent PR updates for the same branch.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # PAT lets Actions open the version-bump PR (GITHUB_TOKEN is forbidden
          # from creating PRs unless the repo setting is enabled).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # image-build: build each arch on a NATIVE runner (no QEMU), push by digest.
  # ---------------------------------------------------------------------------
  image-build:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform slug
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Docker meta (labels only)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/qveensi/routecrab

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/qveensi/routecrab,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # image-merge: assemble the multi-arch manifest from the per-arch digests.
  # ---------------------------------------------------------------------------
  image-merge:
    name: Publish image manifest
    runs-on: ubuntu-24.04
    needs: image-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      # Mint an OIDC token for keyless cosign signing (Fulcio cert + Rekor log).
      id-token: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/qveensi/routecrab
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting of -t flags and digest refs
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/qveensi/routecrab@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect "ghcr.io/qveensi/routecrab:${{ steps.meta.outputs.version }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless)
        env:
          IMAGE: ghcr.io/qveensi/routecrab
        run: |
          # Sign by manifest-list digest, not tag, so the signature is pinned to
          # the exact artifact. The ghcr login above gives cosign its push creds.
          digest=$(docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${IMAGE}@${digest}"

  # ---------------------------------------------------------------------------
  # chart-publish: Helm chart → OCI ghcr.io/qveensi/charts
  # ---------------------------------------------------------------------------
  chart-publish:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
      # Mint an OIDC token for keyless cosign signing of the OCI chart.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Log in to ghcr.io OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Inject per-version changes for Artifact Hub
        # Turn this version's CHANGELOG.md section into the artifacthub.io/changes
        # annotation so the package page shows a per-version change list. Done at
        # package time (not committed): release-plz owns CHANGELOG, and Chart.yaml
        # is templated from the tag. yq ships on ubuntu-latest runners.
        run: |
          version="${GITHUB_REF_NAME#v}"
          changes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab && /^[[:space:]]*-[[:space:]]/ {
              line=$0; sub(/^[[:space:]]*-[[:space:]]*/,"",line)
              gsub(/\*\([^)]*\)\*[[:space:]]*/,"",line)        # drop *(scope)* prefix
              gsub(/[[:space:]]*\(\[#[0-9]+\]\([^)]*\)\)/,"",line)  # drop ([#NN](url)) suffix
              gsub(/[[:space:]]+$/,"",line)
              if (line != "") print "- " line
            }' CHANGELOG.md)
          if [ -n "$changes" ]; then
            CH="$changes" yq -i '.annotations["artifacthub.io/changes"] = strenv(CH)' deploy/helm/routecrab/Chart.yaml
            echo "Injected artifacthub.io/changes:"; echo "$changes"
          else
            echo "No CHANGELOG section for ${version}; leaving changes annotation unset."
          fi

      - name: Package Helm chart
        # Drive chart version + appVersion from the release tag so the published
        # chart always matches the image (release-plz bumps Cargo, not Chart.yaml).
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/routecrab --version "$version" --app-version "$version"

      - name: Push Helm chart
        id: push
        run: |
          for pkg in routecrab-*.tgz; do
            # helm push prints "Digest: sha256:…" — capture it to sign by digest.
            out=$(helm push "${pkg}" oci://ghcr.io/qveensi/helm 2>&1)
            echo "${out}"
            echo "digest=$(echo "${out}" | awk '/Digest:/ {print $2}')" >> "$GITHUB_OUTPUT"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Helm chart (keyless)
        run: |
          # helm registry login does not populate the docker cred store cosign
          # reads, so log cosign in explicitly before signing by digest.
          cosign login ghcr.io --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}"
          cosign sign --yes "ghcr.io/qveensi/helm/routecrab@${{ steps.push.outputs.digest }}"

      - name: Upload chart package for the HTTP repo job
        # Hand the canonically-named tgz (routecrab-<ver>.tgz, before the
        # release-asset rename below) to the helm-repo job so the OCI and HTTP
        # repos publish the exact same package, changes annotation and all.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-chart
          path: routecrab-*.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Attach chart to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rename to make it obvious this asset is a packaged Helm chart.
          version="${GITHUB_REF_NAME#v}"
          for pkg in routecrab-*.tgz; do
            asset="routecrab-helm-chart-${version}.tgz"
            cp "${pkg}" "${asset}"
            gh release upload "$GITHUB_REF_NAME" "${asset}" --clobber
          done

  # ---------------------------------------------------------------------------
  # helm-repo: also publish the chart to an HTTP Helm repo on the gh-pages
  # branch, so `helm repo add` works alongside the OCI registry. The chart tgz
  # files live on gh-pages and index.yaml points at https://qveensi.github.io.
  # ---------------------------------------------------------------------------
  helm-repo:
    name: Publish chart to HTTP Helm repo
    runs-on: ubuntu-latest
    needs: chart-publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Download chart package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: helm-chart

      - name: Publish to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Reuse the existing repo branch, or bootstrap an orphan one on first run.
          if git ls-remote --exit-code --heads "$remote" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 "$remote" pages
          else
            git clone --depth 1 "$remote" pages
            ( cd pages && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
          fi
          cp routecrab-*.tgz pages/
          cd pages
          merge=""
          [ -f index.yaml ] && merge="--merge index.yaml"
          # shellcheck disable=SC2086  # $merge is intentionally word-split (flag or empty)
          helm repo index . --url https://qveensi.github.io/routecrab $merge
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chart: publish ${GITHUB_REF_NAME} to HTTP Helm repo"
          git push "$remote" HEAD:gh-pages

  # ---------------------------------------------------------------------------
  # binaries: build native Linux binaries (gnu/glibc), attach to GitHub release
  # ---------------------------------------------------------------------------
  binaries:
    name: Release binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      # Keyless cosign sign-blob of the release binaries.
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Build release binary
        run: cargo build --release --locked --bin routecrab
      - name: Package + checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="routecrab-${VERSION}-linux-${{ matrix.arch }}"
          cp target/release/routecrab "${BIN}"
          sha256sum "${BIN}" > "${BIN}.sha256"
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign binary (keyless)
        run: |
          # cosign v3 sign-blob emits a single Sigstore bundle (signature +
          # certificate + Rekor entry). Name it .sig so consumers and OpenSSF
          # Scorecard's Signed-Releases check find it as a signature asset.
          BIN="routecrab-${GITHUB_REF_NAME#v}-linux-${{ matrix.arch }}"
          cosign sign-blob --yes --bundle "${BIN}.sig" "${BIN}"
      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="routecrab-${GITHUB_REF_NAME#v}-linux-${{ matrix.arch }}"
          gh release upload "$GITHUB_REF_NAME" \
            "${BIN}" "${BIN}.sha256" "${BIN}.sig" \
            --clobber

  # ---------------------------------------------------------------------------
  # mirror-dockerhub: copy the published multi-arch image ghcr -> Docker Hub.
  # Opt-in: runs only when the DOCKERHUB_REPO repo variable is set (plus secrets
  # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN). Copies the existing manifest — no rebuild.
  # ---------------------------------------------------------------------------
  mirror-dockerhub:
    name: Mirror image to Docker Hub
    runs-on: ubuntu-latest
    needs: image-merge
    if: startsWith(github.ref, 'refs/tags/v') && vars.DOCKERHUB_REPO != ''
    permissions:
      packages: read
      # Mint an OIDC token for keyless cosign signing of the mirrored image.
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Copy multi-arch image (ghcr -> Docker Hub)
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting of -t flags
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "ghcr.io/qveensi/routecrab:${GITHUB_REF_NAME#v}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker Hub image (keyless)
        env:
          IMAGE: docker.io/${{ vars.DOCKERHUB_REPO }}
        run: |
          # cosign signatures are per-registry; the ghcr signature does not copy
          # with the manifest, so sign the Docker Hub digest separately.
          digest=$(docker buildx imagetools inspect "${IMAGE}:${GITHUB_REF_NAME#v}" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${IMAGE}@${digest}"
