name: release

# Single workflow with two triggers:
#   - push to main  → release-plz jobs (PR + tag creation)
#   - push of v* tag → image and Helm chart publish jobs
#
# Jobs are gated by `if:` so only the relevant set runs for each trigger.
on:
  push:
    branches: [main]
    tags: ["v*"]

# ---------------------------------------------------------------------------
# release-plz: open/update a release PR, then tag + GitHub-release when merged
# ---------------------------------------------------------------------------
jobs:
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # Runs only on pushes to main (not on tag pushes).
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT (RELEASE_PLZ_TOKEN) is required so the tag release-plz pushes
          # re-triggers the tag-gated publish workflows below — GitHub skips
          # workflow events from the default GITHUB_TOKEN. Falls back to
          # GITHUB_TOKEN (release succeeds, but image/chart publish won't fire).
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Prevent concurrent PR updates for the same branch.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # PAT lets Actions open the version-bump PR (GITHUB_TOKEN is forbidden
          # from creating PRs unless the repo setting is enabled).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # image-publish: multi-arch Docker image → ghcr.io/qveensi/routecrab
  # ---------------------------------------------------------------------------
  image-publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/qveensi/routecrab
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # chart-publish: Helm chart → OCI ghcr.io/qveensi/charts
  # ---------------------------------------------------------------------------
  chart-publish:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to ghcr.io OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        run: helm package deploy/helm/routecrab

      - name: Push Helm chart
        run: |
          CHART_PKG=$(ls routecrab-*.tgz)
          helm push "${CHART_PKG}" oci://ghcr.io/qveensi/charts
