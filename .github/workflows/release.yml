name: release

# Single workflow with two triggers:
#   - push to main  → release-plz jobs (PR + tag creation)
#   - push of v* tag → image and Helm chart publish jobs
#
# Jobs are gated by `if:` so only the relevant set runs for each trigger.
on:
  push:
    branches: [main]
    tags: ["v*"]

# ---------------------------------------------------------------------------
# release-plz: open/update a release PR, then tag + GitHub-release when merged
# ---------------------------------------------------------------------------
jobs:
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # Runs only on pushes to main (not on tag pushes).
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # A PAT (RELEASE_PLZ_TOKEN) is required so the tag release-plz pushes
          # re-triggers the tag-gated publish workflows below — GitHub skips
          # workflow events from the default GITHUB_TOKEN. Falls back to
          # GITHUB_TOKEN (release succeeds, but image/chart publish won't fire).
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Prevent concurrent PR updates for the same branch.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # PAT lets Actions open the version-bump PR (GITHUB_TOKEN is forbidden
          # from creating PRs unless the repo setting is enabled).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # image-build: build each arch on a NATIVE runner (no QEMU), push by digest.
  # ---------------------------------------------------------------------------
  image-build:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform slug
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Docker meta (labels only)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/qveensi/routecrab

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/qveensi/routecrab,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # image-merge: assemble the multi-arch manifest from the per-arch digests.
  # ---------------------------------------------------------------------------
  image-merge:
    name: Publish image manifest
    runs-on: ubuntu-24.04
    needs: image-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/qveensi/routecrab
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting of -t flags and digest refs
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/qveensi/routecrab@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect "ghcr.io/qveensi/routecrab:${{ steps.meta.outputs.version }}"

  # ---------------------------------------------------------------------------
  # chart-publish: Helm chart → OCI ghcr.io/qveensi/charts
  # ---------------------------------------------------------------------------
  chart-publish:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to ghcr.io OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        # Drive chart version + appVersion from the release tag so the published
        # chart always matches the image (release-plz bumps Cargo, not Chart.yaml).
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/routecrab --version "$version" --app-version "$version"

      - name: Push Helm chart
        run: |
          for pkg in routecrab-*.tgz; do
            helm push "${pkg}" oci://ghcr.io/qveensi/helm
          done

      - name: Attach chart to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rename to make it obvious this asset is a packaged Helm chart.
          version="${GITHUB_REF_NAME#v}"
          for pkg in routecrab-*.tgz; do
            asset="routecrab-helm-chart-${version}.tgz"
            cp "${pkg}" "${asset}"
            gh release upload "$GITHUB_REF_NAME" "${asset}" --clobber
          done

  # ---------------------------------------------------------------------------
  # binaries: build native Linux binaries (gnu/glibc), attach to GitHub release
  # ---------------------------------------------------------------------------
  binaries:
    name: Release binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked --bin routecrab
      - name: Package + checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="routecrab-${VERSION}-linux-${{ matrix.arch }}"
          cp target/release/routecrab "${BIN}"
          sha256sum "${BIN}" > "${BIN}.sha256"
      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "routecrab-${VERSION}-linux-${{ matrix.arch }}" \
            "routecrab-${VERSION}-linux-${{ matrix.arch }}.sha256" \
            --clobber

  # ---------------------------------------------------------------------------
  # mirror-dockerhub: copy the published multi-arch image ghcr -> Docker Hub.
  # Opt-in: runs only when the DOCKERHUB_REPO repo variable is set (plus secrets
  # DOCKERHUB_USERNAME / DOCKERHUB_TOKEN). Copies the existing manifest — no rebuild.
  # ---------------------------------------------------------------------------
  mirror-dockerhub:
    name: Mirror image to Docker Hub
    runs-on: ubuntu-latest
    needs: image-merge
    if: startsWith(github.ref, 'refs/tags/v') && vars.DOCKERHUB_REPO != ''
    permissions:
      packages: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Copy multi-arch image (ghcr -> Docker Hub)
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting of -t flags
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "ghcr.io/qveensi/routecrab:${GITHUB_REF_NAME#v}"
