name: ci
on:
  push: { branches: [main] }
  pull_request:
# Cancel superseded runs for the same ref so PR pushes don't pile up matrices.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Pinned by SHA, so the toolchain channel must be named explicitly.
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  # Verify the crate still compiles on its declared MSRV (Cargo.toml rust-version).
  # Without this, an accidental newer-stdlib API silently breaks the 1.88 claim.
  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Dependabot collapses both rust-toolchain pins to one action SHA; the
      # toolchain channel comes from the explicit input below, not the SHA.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # Action is SHA-pinned, so name the MSRV channel explicitly.
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --locked --all-targets

  # Build the release image on every PR so a broken Dockerfile (e.g. a missing
  # COPY of build.rs) fails here instead of after release-plz has already cut
  # the tag — the real multi-arch push only runs post-tag in release.yml.
  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build image (amd64, load for scan)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: routecrab:ci
          cache-from: type=gha,scope=ci-amd64
          cache-to: type=gha,mode=max,scope=ci-amd64
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: routecrab:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # Compile the cargo-fuzz targets so a broken fuzz harness is caught on PRs.
  # (Running the fuzzer is separate/manual; this just builds it. Needs nightly.)
  fuzz:
    name: fuzz build
    runs-on: ubuntu-latest
    # Force nightly everywhere: the repo's rust-toolchain.toml pins stable, which
    # would otherwise win over the installed nightly and break cargo fuzz's -Z flags.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "fuzz"
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build
