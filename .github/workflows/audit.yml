name: audit

# Dependency hygiene: RustSec advisories, license policy, banned/duplicate
# crates, and source restrictions. Runs on dependency changes and weekly so
# newly published advisories are caught even without a commit.
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
