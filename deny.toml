# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run locally: cargo deny check

[advisories]
# RustSec vulnerabilities always fail (cargo-deny v2). Scope "unmaintained"
# to our own workspace crates so transitive unmaintained deps (e.g. serde_yaml
# pulled via gateway-api) surface as warnings, not CI failures.
unmaintained = "workspace"
yanked = "deny"
ignore = []

[bans]
# axum-prometheus pulls tower 0.4 alongside the project's tower 0.5, so a hard
# "deny" on duplicates would fail. Warn instead and revisit on upgrade.
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.9
# Permissive licenses only. A dependency with a license not listed here fails
# the check — add a scoped entry under `exceptions` rather than widening this.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
