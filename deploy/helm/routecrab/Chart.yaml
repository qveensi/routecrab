  artifacthub.io/category: monitoring-logging
  artifacthub.io/links: |
    - name: source
      url: https://github.com/qveensi/routecrab
    - name: support
      url: https://github.com/qveensi/routecrab/issues
  artifacthub.io/maintainers: |
    - name: Yevhenii Huzii
      email: yevhenii.huzii@gmail.com
  artifacthub.io/images: |
    - name: routecrab
      image: ghcr.io/qveensi/routecrab:latest
      platforms:
        - linux/amd64
        - linux/arm64
