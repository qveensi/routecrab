apiVersion: v2
name: routecrab
description: >
  routecrab watches Gateway API HTTPRoute/Gateway resources cluster-wide and
  exposes a live JSON inventory with health classification.
type: application
version: "0.3.1"
appVersion: "0.3.1"
home: https://github.com/qveensi/routecrab
# Artifact Hub package logo (raw URL; resolves once merged to main).
