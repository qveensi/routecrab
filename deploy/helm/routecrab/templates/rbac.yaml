{{- if .Values.serviceAccount.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "routecrab.fullname" . }}
  labels:
    {{- include "routecrab.labels" . | nindent 4 }}
rules:
  # Watch HTTPRoute resources cluster-wide.
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "routecrab.fullname" . }}
  labels:
    {{- include "routecrab.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "routecrab.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "routecrab.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
