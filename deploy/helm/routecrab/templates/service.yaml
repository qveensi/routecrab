apiVersion: v1
kind: Service
metadata:
  name: {{ include "routecrab.fullname" . }}
  labels:
    {{- include "routecrab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "routecrab.selectorLabels" . | nindent 4 }}
