{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "routecrab.fullname" . }}
  labels:
    {{- include "routecrab.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "routecrab.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    # Default: allow the board (8080) and metrics scrape ({{ .Values.metrics.port }}) from anywhere.
    - ports:
        - port: 8080
          protocol: TCP
        - port: {{ .Values.metrics.port }}
          protocol: TCP
    {{- end }}
  egress:
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    # Default: allow all egress — routecrab must reach the kube-apiserver and
    # HEAD-probe arbitrary route backends. Tighten via networkPolicy.egress.
    - {}
    {{- end }}
{{- end }}
